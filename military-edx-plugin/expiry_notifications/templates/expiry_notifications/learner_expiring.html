<!DOCTYPE html>
<html lang="th">
<head><meta charset="UTF-8"><title>แจ้งเตือนใบประกาศใกล้หมดอายุ</title></head>
<body style="font-family: sans-serif; color: #333; max-width: 600px; margin: auto;">
  <div style="background:#1F4E79;padding:20px;border-radius:8px 8px 0 0;">
    <h2 style="color:#fff;margin:0;">⚠️ ใบประกาศใกล้หมดอายุ</h2>
  </div>
  <div style="border:1px solid #ddd;padding:24px;border-radius:0 0 8px 8px;">
    <p>เรียน <strong>{{ user.military_profile.full_name_th }}</strong></p>
    <p>ใบประกาศสำหรับหลักสูตร <strong>{{ course_id }}</strong> จะหมดอายุใน
       <span style="color:#c00;font-size:1.2em;font-weight:bold;">{{ days_remaining }} วัน</span>
    </p>
    <p>กรุณาดำเนินการต่ออายุก่อนวันหมดอายุ มิฉะนั้นท่านจะไม่สามารถใช้ใบประกาศนี้ได้</p>
    <div style="text-align:center;margin:24px 0;">
      <a href="{{ LMS_ROOT_URL }}/renewal/"
         style="background:#1F4E79;color:#fff;padding:12px 28px;border-radius:6px;text-decoration:none;font-size:1em;">
        ต่ออายุใบประกาศ
      </a>
    </div>
    <p style="color:#666;font-size:.9em;">หากมีข้อสงสัยกรุณาติดต่อฝ่าย HR</p>
  </div>
</body>
</html>
